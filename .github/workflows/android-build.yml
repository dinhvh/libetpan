name: Build Android libraries

# Manually triggered from any branch. Builds the libetpan Android static
# library together with all of its native dependencies (OpenSSL, Cyrus SASL,
# libiconv) and the MailCore2-only ctemplate dependency, then uploads every
# resulting .zip as a build artifact.
on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: "Android NDK version to build with (tested: 27.1.12297006, 26.3.11579264)"
        required: true
        default: "27.1.12297006"

jobs:
  build:
    # The dependency build scripts hardcode HOST_TAG=darwin-x86_64, so the NDK
    # toolchain path only resolves on an Intel macOS host. macos-13 is x86_64.
    runs-on: macos-13

    steps:
      - name: Checkout (current branch)
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK ${{ inputs.ndk_version }}
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --install "ndk;${{ inputs.ndk_version }}"
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/${{ inputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Show toolchain info
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK"
          "$ANDROID_NDK/ndk-build" --version || true
          python3 --version
          autoconf --version | head -1 || true

      - name: Build libetpan + dependencies (OpenSSL, Cyrus SASL, libiconv)
        working-directory: build-android
        run: ./build.sh

      - name: Build ctemplate (MailCore2 dependency)
        working-directory: build-android/dependencies/ctemplate
        run: ./build.sh

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp build-android/libetpan-android-*.zip                          artifacts/
          cp build-android/dependencies/openssl/openssl-android-*.zip       artifacts/
          cp build-android/dependencies/cyrus-sasl/cyrus-sasl-android-*.zip artifacts/
          cp build-android/dependencies/iconv/iconv-android-*.zip           artifacts/
          cp build-android/dependencies/ctemplate/ctemplate-android-*.zip   artifacts/
          ls -lh artifacts/

      - name: Upload Android libraries
        uses: actions/upload-artifact@v4
        with:
          name: libetpan-android-${{ github.ref_name }}-${{ github.sha }}
          path: artifacts/*.zip
          if-no-files-found: error
          retention-days: 30
